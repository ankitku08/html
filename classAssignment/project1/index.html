<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Elements Form</title>
</head>
<body>

<h1>Complete HTML Form</h1>

<form action="#" method="post">

    <!-- Text Inputs -->
    <label>Full Name:</label><br>
    <input type="text" name="name" placeholder="Enter your name"><br><br>

    <label>Email:</label><br>
    <input type="email" name="email"><br><br>

    <label>Password:</label><br>
    <input type="password" name="password"><br><br>

    <label>Phone:</label><br>
    <input type="tel" name="phone"><br><br>

    <!-- Number -->
    <label>Age:</label><br>
    <input type="number" name="age" min="1" max="100"><br><br>

    <!-- Date & Time -->
    <label>Date of Birth:</label><br>
    <input type="date" name="dob"><br><br>

    <label>Time:</label><br>
    <input type="time" name="time"><br><br>

    <label>Month:</label><br>
    <input type="month" name="month"><br><br>

    <label>Week:</label><br>
    <input type="week" name="week"><br><br>

    <!-- Range -->
    <label>Experience (0-10):</label><br>
    <input type="range" name="exp" min="0" max="10"><br><br>

    <!-- Color -->
    <label>Favorite Color:</label><br>
    <input type="color" name="color"><br><br>

    <!-- Radio Buttons -->
    <label>Gender:</label><br>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <input type="radio" name="gender" value="other"> Other<br><br>

    <!-- Checkboxes -->
    <label>Skills:</label><br>
    <input type="checkbox" name="skills" value="html"> HTML
    <input type="checkbox" name="skills" value="css"> CSS
    <input type="checkbox" name="skills" value="js"> JavaScript<br><br>

    <!-- Dropdown -->
    <label>Country:</label><br>
    <select name="state">
        <option value="">Select</option>
        <option>bihar</option>
        <option>AP</option>
        <option>UK</option>
      <option>UP</option>
        <option>MP</option>
    </select><br><br>

    <!-- Multi Select -->
    <label>Languages Known:</label><br>
    <select name="languages" multiple>
        <option>English</option>
        <option>Hindi</option>
        <option>Spanish</option>
    </select><br><br>

    <!-- Textarea -->
    <label>Address:</label><br>
    <textarea name="address" rows="4" cols="30"></textarea><br><br>

    <!-- File Upload -->
    <label>Upload Resume:</label><br>
    <input type="file" name="file"><br><br>

    <!-- URL -->
    <label>Website:</label><br>
    <input type="url" name="website"><br><br>

    <!-- Search -->
    <label>Search:</label><br>
    <input type="search" name="search"><br><br>

    <!-- Hidden -->
    <input type="hidden" name="hiddenField" value="hiddenValue">

    <!-- Datalist -->
    <label>Choose Browser:</label><br>
    <input list="browsers" name="browser">
    <datalist id="browsers">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Edge">
    </datalist><br><br>

    <!-- Progress -->
    <label>Progress:</label><br>
    <progress value="50" max="100"></progress><br><br>

    <!-- Meter -->
    <label>Skill Level:</label><br>
    <meter value="0.7">70%</meter><br><br>

    <!-- Buttons -->
    <button type="submit">Submit</button>
    <button type="reset">Reset</button>
    <button type="button">Click Me</button>

</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Ludo Board</title>
    <style>
        :root {
            /* Realistic, slightly muted physical board colors */
            --ludo-red: #d32f2f;
            --ludo-green: #388e3c;
            --ludo-yellow: #fbc02d;
            --ludo-blue: #1976d2;
            --ludo-board-bg: #ffffff;
            --ludo-grid-line: #222222;
            --ludo-wood: #5c3a21;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #e6e4dc; /* Soft table background */
            font-family: sans-serif;
        }

        /* Outer Wooden Frame */
        .board-frame {
            width: 90vmin;
            height: 90vmin;
            max-width: 800px;
            max-height: 800px;
            background-color: var(--ludo-wood);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* Main 15x15 Grid */
        .ludo-board {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            gap: 1.5px;
            background-color: var(--ludo-grid-line);
            border: 2px solid var(--ludo-grid-line);
            box-sizing: border-box;
        }

        /* Board Positioning Classes */
        .pos-tl { grid-area: 1 / 1 / 7 / 7; }
        .pos-tr { grid-area: 1 / 10 / 7 / 16; }
        .pos-bl { grid-area: 10 / 1 / 16 / 7; }
        .pos-br { grid-area: 10 / 10 / 16 / 16; }
        .pos-center { grid-area: 7 / 7 / 10 / 10; }
        .pos-left { grid-area: 7 / 1 / 10 / 7; }
        .pos-top { grid-area: 1 / 7 / 7 / 10; }
        .pos-right { grid-area: 7 / 10 / 10 / 16; }
        .pos-bottom { grid-area: 10 / 7 / 16 / 10; }

        /* Home Areas */
        .home {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12%;
            box-sizing: border-box;
        }
        
        .home-inner {
            width: 100%;
            height: 100%;
            background-color: var(--ludo-board-bg);
            border: 2px solid var(--ludo-grid-line);
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20%;
            padding: 20%;
            box-sizing: border-box;
        }

        .circle {
            border-radius: 50%;
            border: 2px solid var(--ludo-grid-line);
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.3);
        }

        /* Center Triangle Area */
        .center-area {
            position: relative;
            background-color: var(--ludo-grid-line);
            overflow: hidden;
        }
        
        /* X-Shape diagonal divider for realistic center */
        .center-area::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(to bottom right, transparent calc(50% - 1px), var(--ludo-grid-line) calc(50% - 1px), var(--ludo-grid-line) calc(50% + 1px), transparent calc(50% + 1px)),
                linear-gradient(to top right, transparent calc(50% - 1px), var(--ludo-grid-line) calc(50% - 1px), var(--ludo-grid-line) calc(50% + 1px), transparent calc(50% + 1px));
            pointer-events: none;
            z-index: 2;
        }

        .triangle {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .triangle-red { background-color: var(--ludo-red); clip-path: polygon(0 0, 50% 50%, 0 100%); }
        .triangle-green { background-color: var(--ludo-green); clip-path: polygon(0 0, 100% 0, 50% 50%); }
        .triangle-yellow { background-color: var(--ludo-yellow); clip-path: polygon(100% 0, 100% 100%, 50% 50%); }
        .triangle-blue { background-color: var(--ludo-blue); clip-path: polygon(0 100%, 50% 50%, 100% 100%); }

        /* Path Tracks */
        .track {
            display: grid;
            gap: 1.5px;
            background-color: var(--ludo-grid-line);
        }

        .left-track, .right-track {
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(3, 1fr);
        }

        .top-track, .bottom-track {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(6, 1fr);
        }

        /* Cells inside tracks */
        .cell {
            background-color: var(--ludo-board-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(14px, 3.5vmin, 28px); /* Responsive star size */
        }

        /* Color Modifiers */
        .bg-red { background-color: var(--ludo-red); }
        .bg-green { background-color: var(--ludo-green); }
        .bg-yellow { background-color: var(--ludo-yellow); }
        .bg-blue { background-color: var(--ludo-blue); }

        .bg-red .circle, .cell.red { background-color: var(--ludo-red); }
        .bg-green .circle, .cell.green { background-color: var(--ludo-green); }
        .bg-yellow .circle, .cell.yellow { background-color: var(--ludo-yellow); }
        .bg-blue .circle, .cell.blue { background-color: var(--ludo-blue); }

        /* Safe Zones (Stars) */
        .star::after {
            content: '★';
            color: rgba(0, 0, 0, 0.25); /* Subtle dark star */
        }

        .start::after {
            content: '★';
            color: rgba(255, 255, 255, 0.9); /* Bright white star on colored tiles */
        }
    </style>
</head>
<body>

<div class="board-frame">
    <div class="ludo-board">
        
        <div class="home bg-red pos-tl">
            <div class="home-inner">
                <div class="circle"></div><div class="circle"></div>
                <div class="circle"></div><div class="circle"></div>
            </div>
        </div>

        <div class="home bg-green pos-tr">
            <div class="home-inner">
                <div class="circle"></div><div class="circle"></div>
                <div class="circle"></div><div class="circle"></div>
            </div>
        </div>

        <div class="home bg-blue pos-bl">
            <div class="home-inner">
                <div class="circle"></div><div class="circle"></div>
                <div class="circle"></div><div class="circle"></div>
            </div>
        </div>

        <div class="home bg-yellow pos-br">
            <div class="home-inner">
                <div class="circle"></div><div class="circle"></div>
                <div class="circle"></div><div class="circle"></div>
            </div>
        </div>


        <div class="center-area pos-center">
            <div class="triangle triangle-red"></div>
            <div class="triangle triangle-green"></div>
            <div class="triangle triangle-yellow"></div>
            <div class="triangle triangle-blue"></div>
        </div>


        <div class="track left-track pos-left">
            <div class="cell"></div>
            <div class="cell red start"></div> <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div>
            <div class="cell red"></div><div class="cell red"></div><div class="cell red"></div><div class="cell red"></div><div class="cell red"></div>
            <div class="cell"></div><div class="cell"></div>
            <div class="cell star"></div> <div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>

        <div class="track top-track pos-top">
            <div class="cell"></div> <div class="cell"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell green"></div> <div class="cell green start"></div> <div class="cell star"></div> <div class="cell green"></div> <div class="cell"></div> <div class="cell"></div> <div class="cell green"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell green"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell green"></div> <div class="cell"></div>
        </div>

        <div class="track right-track pos-right">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell star"></div> <div class="cell"></div><div class="cell"></div>
            <div class="cell yellow"></div><div class="cell yellow"></div><div class="cell yellow"></div><div class="cell yellow"></div><div class="cell yellow"></div>
            <div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell yellow start"></div> <div class="cell"></div>
        </div>

        <div class="track bottom-track pos-bottom">
            <div class="cell"></div> <div class="cell blue"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell blue"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell blue"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell blue"></div> <div class="cell star"></div> <div class="cell blue start"></div> <div class="cell blue"></div> <div class="cell"></div>
            <div class="cell"></div> <div class="cell"></div> <div class="cell"></div>
        </div>

    </div>
</div>

</body>
</html>
